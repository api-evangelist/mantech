description: >-
  ManTech International is a Herndon, Virginia-based federal services
  contractor providing cybersecurity, data and AI, digital transformation,
  and intelligent engineering capabilities to U.S. defense, intelligence,
  and federal civilian agencies. Founded in 1968 and publicly traded on
  NASDAQ as MANT until 2022, the company was acquired by The Carlyle Group
  in April 2022 in an all-cash take-private transaction valued at
  approximately $4.2 billion and now operates as a Carlyle portfolio
  company. ManTech holds positions on major federal contract vehicles
  including Alliant 2/3, OASIS+, SeaPort NxG, CIO-SP3, T4NG, and ICON, and
  does not publish any developer-facing API or public OpenAPI surface.
